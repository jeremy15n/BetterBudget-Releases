name: VirusTotal release scan

on:
  release:
    types: [published]

permissions:
  contents: write

# One job at a time avoids two releases racing on the same results file commit.
concurrency:
  group: virustotal-results-${{ github.repository }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Scan release assets and update VIRUSTOTAL_RESULTS.md
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VT_RESULTS_FILE: VIRUSTOTAL_RESULTS.md
          # Public API upload limit is 32 MiB; increase only if your VT plan allows larger uploads.
          VT_MAX_BYTES: "33554432"
          # POSIX ERE: which attachment names to submit (installer binaries by default).
          VT_REGEX: '\.(exe|msi)$'
        run: bash .github/scripts/virustotal-release-scan.sh
